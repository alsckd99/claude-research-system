name: Nightly Loop (research-os)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Orchestrator mode'
        required: false
        default: 'nightly'
        type: choice
        options: [analyze-only, nightly, full-loop]

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Validate & Test
        run: |
          python scripts/validate_config.py
          pytest -q tests/

      - name: Run experiment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_experiment.py \
            --config configs/base.yaml \
            --output results/runs/ci_$(date +%Y%m%d_%H%M%S)

      - name: Analyze & Report
        run: |
          python scripts/analyze_failures.py --auto
          python scripts/summarize_results.py --auto
          python scripts/propose_next_steps.py --auto
          python scripts/visualize_results.py --auto
          python scripts/generate_decision_report.py --auto

      - name: Commit reports
        run: |
          git config user.name "research-os-bot"
          git config user.email "bot@research-os"
          git add results/reports/ results/registry.json
          git diff --staged --quiet || \
            git commit -m "chore: nightly loop $(date +%Y%m%d)"
          git push origin HEAD

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ github.run_number }}
          path: results/reports/
          retention-days: 30
