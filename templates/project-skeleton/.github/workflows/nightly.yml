name: Nightly Loop (research-os)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Orchestrator mode'
        required: false
        default: 'nightly'
        type: choice
        options: [analyze-only, nightly, full-loop]

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Validate & Test
        run: |
          python scripts/validate_config.py
          pytest -q tests/

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RESEARCH_OS_ROOT="${{ github.workspace }}" \
          python -c "
          import subprocess, sys
          subprocess.run([sys.executable, '-m', 'scripts.run_experiment',
            '--config', 'configs/base.yaml',
            '--output', 'experiments/runs/ci_$(date +%Y%m%d_%H%M%S)'])
          " 2>/dev/null || \
          python scripts/run_experiment.py \
            --config configs/base.yaml \
            --output experiments/runs/ci_$(date +%Y%m%d_%H%M%S)

      - name: Analyze & Report
        run: |
          python scripts/analyze_failures.py
          python scripts/summarize_results.py
          python scripts/propose_next_steps.py

      - name: Commit reports
        run: |
          git config user.name "research-os-bot"
          git config user.email "bot@research-os"
          git add experiments/reports/ experiments/registry.json
          git diff --staged --quiet || \
            git commit -m "chore: nightly loop $(date +%Y%m%d)"
          git push origin HEAD

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-${{ github.run_number }}
          path: experiments/reports/
          retention-days: 30
